<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="feltGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2d7a3a"/>
      <stop offset="60%" style="stop-color:#1e5c28"/>
      <stop offset="100%" style="stop-color:#143d1d"/>
    </radialGradient>
    <radialGradient id="tableGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Main felt -->
  <ellipse cx="400" cy="300" rx="380" ry="280" fill="url(#feltGrad)"/>
  <!-- Inner oval (playing area) -->
  <ellipse cx="400" cy="300" rx="300" ry="210" fill="none" stroke="#3a9a4a" stroke-width="2" opacity="0.4"/>
  <!-- Center glow -->
  <ellipse cx="400" cy="300" rx="300" ry="210" fill="url(#tableGlow)"/>
  <!-- Corner markers -->
  <g fill="#3a9a4a" opacity="0.3">
    <text x="130" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="14">♠</text>
    <text x="670" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="14">♥</text>
    <text x="130" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="14">♦</text>
    <text x="670" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="14">♣</text>
  </g>
  <!-- Dealers position marker -->
  <circle cx="400" cy="300" r="12" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15" stroke-dasharray="3,3"/>
  <text x="400" y="305" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffffff" opacity="0.2">D</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="50%" style="stop-color:#ffeb3b"/>
      <stop offset="100%" style="stop-color:#ff1744"/>
    </linearGradient>
  </defs>
  <!-- Background ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
  <!-- Animated arc (default: full) -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#timerGrad)" stroke-width="6" stroke-dasharray="276" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 50 50)"/>
</svg>
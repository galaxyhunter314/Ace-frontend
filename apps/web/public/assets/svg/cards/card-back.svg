<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 250">
  <defs>
    <pattern id="cardPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#1a3a5c"/>
      <circle cx="10" cy="10" r="0.8" fill="#2a5a8c" opacity="0.5"/>
    </pattern>
    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a5a8c"/>
      <stop offset="50%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2a5a8c"/>
    </linearGradient>
  </defs>
  <!-- Card body -->
  <rect x="2" y="2" width="176" height="246" rx="8" ry="8" fill="url(#cardBorder)" stroke="#0d2137" stroke-width="2"/>
  <rect x="6" y="6" width="168" height="238" rx="6" ry="6" fill="url(#cardPattern)"/>
  <!-- Inner border -->
  <rect x="10" y="10" width="160" height="230" rx="4" ry="4" fill="none" stroke="#3a7abd" stroke-width="1" opacity="0.5"/>
  <!-- Center diamond pattern -->
  <g fill="#3a7abd" opacity="0.3">
    <polygon points="90,90 96,100 90,110 84,100"/>
    <polygon points="90,140 96,150 90,160 84,150"/>
    <polygon points="90,50 96,60 90,70 84,60"/>
    <polygon points="90,115 94,122 90,129 86,122"/>
  </g>
  <!-- Corner diamonds -->
  <polygon points="20,25 25,32 20,39 15,32" fill="#3a7abd" opacity="0.4"/>
  <polygon points="160,25 165,32 160,39 155,32" fill="#3a7abd" opacity="0.4"/>
  <polygon points="20,225 25,232 20,239 15,232" fill="#3a7abd" opacity="0.4"/>
  <polygon points="160,225 165,232 160,239 155,232" fill="#3a7abd" opacity="0.4"/>
</svg>